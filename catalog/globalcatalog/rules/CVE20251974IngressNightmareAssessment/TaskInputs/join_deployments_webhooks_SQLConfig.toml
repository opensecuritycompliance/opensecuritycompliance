SQLQuery = "SELECT\n    inputfile1.DeploymentName,\n    inputfile1.Namespace,\n    inputfile1.AppVersion,\n    inputfile1.AppName,\n    inputfile1.HelmInstance,\n    inputfile1.ManagedByHelm,\n    inputfile1.Image,\n    inputfile1.WebhookArgPresent,\n    CASE WHEN inputfile2.WebhookName IS NOT NULL THEN true ELSE false END AS WebhookConfigExists,\n    inputfile2.WebhookName\nFROM inputfile1\nLEFT JOIN inputfile2\n    ON (inputfile1.Namespace || '-admission') = inputfile2.WebhookName\n    OR inputfile1.HelmInstance = REPLACE(inputfile2.WebhookName, '-admission', '')\nWHERE inputfile1.AppName = 'ingress-nginx'\n"
OutputFileFormat = "JSON"

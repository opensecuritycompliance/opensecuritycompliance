SQLQuery = "SELECT\n    inputfile1.DeploymentName,\n    inputfile1.Namespace,\n    inputfile1.AppVersion,\n    inputfile1.AppName,\n    inputfile1.HelmInstance,\n    inputfile1.ManagedByHelm,\n    inputfile1.Image,\n    inputfile1.WebhookArgPresent,\n    inputfile1.WebhookConfigExists,\n    inputfile1.WebhookName,\n    CASE WHEN inputfile2.HelmReleaseName IS NOT NULL THEN true ELSE false END AS HelmReleaseFound,\n    COALESCE(inputfile2.HelmStatus, 'not-helm-managed') AS HelmReleaseStatus,\n    CASE\n        WHEN inputfile1.AppVersion IN ('1.11.5','1.12.1','1.13.0','1.13.1','1.13.2','1.13.3','1.13.4','1.13.5','1.13.6','1.13.7','1.13.8','1.13.9','1.14.0','1.14.1','1.14.2','1.14.3','1.14.4','1.14.5','1.15.0','1.15.1') THEN 'PATCHED_VERSION'\n        WHEN inputfile1.WebhookArgPresent = false AND inputfile1.WebhookConfigExists = false THEN 'WEBHOOK_DISABLED'\n        ELSE 'VULNERABLE'\n    END AS RemediationStatus,\n    CASE\n        WHEN inputfile1.AppVersion IN ('1.11.5','1.12.1','1.13.0','1.13.1','1.13.2','1.13.3','1.13.4','1.13.5','1.13.6','1.13.7','1.13.8','1.13.9','1.14.0','1.14.1','1.14.2','1.14.3','1.14.4','1.14.5','1.15.0','1.15.1') THEN 'COMPLIANT'\n        WHEN inputfile1.WebhookArgPresent = false AND inputfile1.WebhookConfigExists = false THEN 'COMPLIANT'\n        ELSE 'NON_COMPLIANT'\n    END AS ComplianceStatus\nFROM inputfile1\nLEFT JOIN inputfile2\n    ON inputfile1.HelmInstance = inputfile2.HelmReleaseName\n"

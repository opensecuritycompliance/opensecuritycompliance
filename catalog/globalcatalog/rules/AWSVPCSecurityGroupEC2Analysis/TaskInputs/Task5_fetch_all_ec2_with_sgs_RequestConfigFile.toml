[Variables]
Action = "DescribeInstances"
Version = "2016-11-15"

[Request]
URL = "https://ec2.amazonaws.com/"
Method = "GET"
ContentType = "application/x-www-form-urlencoded"
Redirect = false
CredentialType = "AWSSignature"
TimeOut = 30
Verify = true
MaxWorkers = 5

[Request.Headers]

[Request.Params]
Action = "<<Action>>"
Version = "<<Version>>"
"Filter.1.Name" = "instance.group-id"
"Filter.1.Value.1" = "<<inputfile.GroupId>>"

[Request.Retries.RetryOnCondition]
ConditionField = "<<response.status_code>>"
ConditionValue = "503|504|429"
TimeInterval = 2
MaxRetries = 3
RetryBaseDelay = 2
RetryMaxDelay = 60

[Request.Data.FormData]

[Request.Data.URLEncoded]

[Request.Data.Raw]

[Request.Data.Binary]
